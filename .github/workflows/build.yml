name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Generate icon
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p src-tauri/icons
          convert -size 512x512 xc:#1a1a2e -alpha on -type TrueColorAlpha PNG32:src-tauri/icons/icon.png
      - run: npm install
      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore /tmp/odfiz.keystore \
            -alias odfiz -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=Odfiz, OU=Dev, O=Odfiz, L=ID, S=ID, C=ID" \
            -storepass odfiz123 -keypass odfiz123
      - name: Init Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
      - name: Build APK
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
      - name: Sign APK
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Signing: $APK"
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -1)/apksigner sign \
            --ks /tmp/odfiz.keystore \
            --ks-pass pass:odfiz123 \
            --key-pass pass:odfiz123 \
            --ks-key-alias odfiz \
            --out app-signed.apk \
            "$APK"
      - uses: actions/upload-artifact@v4
        with:
          name: apk-result
          path: app-signed.apk
